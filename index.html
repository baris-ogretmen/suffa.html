        :root, .theme-oled {

        .font-style-sans .prose-zen p { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-arabic { font-family: 'Amiri', 'Scheherazade New', serif !important; }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden; 
            overscroll-behavior-y: none; /* Mobil elastik kaydırmayı engeller */
        }
        
        .theme-transition {
            transition: background-color 0.8s ease, border-color 0.8s ease, color 0.8s ease, box-shadow 0.8s ease;
        }

        .no-transitions * {
            transition: none !important;
            animation: none !important;
        }

        /* RENKLİ VE ESTETİK SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(to bottom, var(--primary) 0%, #D4AF37 100%);
            border-radius: 10px; 
            border: 2px solid var(--bg-main);
        }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(to bottom, #D4AF37 0%, var(--primary) 100%); }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px;}
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--panel-border);
        }

        /* KİTAP KAPAĞI EFEKTİ */
        .book-card-bg {
            background: linear-gradient(145deg, rgba(2, 44, 34, 0.85) 0%, rgba(5, 10, 8, 0.95) 100%);

            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const norm = normalizeText(keyword);
            return norm.split('').map(char => {

                if (char === 'i') return '[iIıİîÎ]';
                if (char === 'u') return '[uUûÛüÜ]';
                if (char === 's') return '[sSşŞ]';
                if (char === 'c') return '[cCçÇ]';
                if (char === 'o') return '[oOöÖ]';
                if (char === 'g') return '[gGğĞ]';
                return escapeRegExp(char);
            }).join('');

        // --- MAIN APP COMPONENT ---

            // --- PROGRESS BAR DİNLEYİCİSİ ---
            const handleScroll = (e) => {
                const { scrollTop, scrollHeight, clientHeight } = e.currentTarget;
                if (scrollHeight > clientHeight) {
                    const progress = (scrollTop / (scrollHeight - clientHeight)) * 100;
                    setScrollProgress(progress);
                } else {
                    setScrollProgress(0);
                }
            };

            // --- KUSURSUZ OTOMATİK KAYDIRMA MOTORU (setInterval) ---
            useEffect(() => {
                let interval = null;
                if (isAutoScrolling && readingContainerRef.current) {
                    interval = setInterval(() => {
                        const container = readingContainerRef.current;
                        if (container) {
                            container.scrollTop += 1; 
                            const { scrollTop, scrollHeight, clientHeight } = container;
                            if (Math.ceil(scrollTop + clientHeight) >= scrollHeight - 2) {
                                setIsAutoScrolling(false);
                            }
                        }
                    }, 35); // Pürüzsüz hız
                }
                return () => clearInterval(interval);
            }, [isAutoScrolling]);

            // Kaydırma müdahalesi ile otomatik kaydırmayı durdurma
            useEffect(() => {
                const container = readingContainerRef.current;
                const stopScroll = (e) => {
                    if (e.target.closest('.auto-scroll-btn')) return; 
                    if (isAutoScrolling) setIsAutoScrolling(false);
                };
                if (container && activeScreen === 'reading') {
                    container.addEventListener('wheel', stopScroll, { passive: true });
                    container.addEventListener('touchmove', stopScroll, { passive: true });
                }
                return () => {
                    if (container) {
                        container.removeEventListener('wheel', stopScroll);
                        container.removeEventListener('touchmove', stopScroll);
                    }
                };
            }, [isAutoScrolling, activeScreen]);

            // --- ÇİFT TIKLAMA İLE OTOMATİK KAYDIRMA ---
            const handleReadingAreaClick = (e) => {
                // Eğer butona veya menüye tıkladıysa iptal et
                if(e.target.closest('button') || e.target.closest('.glass-panel')) return;
                
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTapTime.current;
                if (tapLength < 300 && tapLength > 0) {
                    setIsAutoScrolling(prev => !prev);
                    triggerHaptic();
                    e.preventDefault();
                }
                lastTapTime.current = currentTime;
            };

            // --- MULTI-LANGUAGE TTS MOTORU ---
            const speakNextChunk = () => {
                if (chunkIndexRef.current >= chunksRef.current.length) { setIsPlaying(false); return; }
                const text = chunksRef.current[chunkIndexRef.current];
                const utterance = new SpeechSynthesisUtterance(text);
                
                const langMap = { 'tr': 'tr-TR', 'ing': 'en-US', 'alm': 'de-DE', 'arp': 'ar-SA' };
                const targetLang = langMap[language] || 'tr-TR';
                const langPrefix = targetLang.split('-')[0]; 
                
                utterance.lang = targetLang;
                utterance.rate = playbackRate;
                
                if (voices.length > 0) {
                    let voice = voices.find(v => v.lang === targetLang && v.name.includes('Google')); 
                    if (!voice) voice = voices.find(v => v.lang.replace('_', '-') === targetLang);
                    if (!voice) voice = voices.find(v => v.lang.toLowerCase().startsWith(langPrefix.toLowerCase()));
                    if (!voice && langPrefix === 'ar') voice = voices.find(v => v.lang.toLowerCase().includes('ar'));
                    if (!voice && langPrefix === 'de') voice = voices.find(v => v.lang.toLowerCase().includes('de'));
                    
                    if (voice) utterance.voice = voice;
                }
                
                utterance.onend = () => { chunkIndexRef.current++; speakNextChunk(); };
                utterance.onerror = () => { chunkIndexRef.current++; speakNextChunk(); };
                synth.speak(utterance);
            };

            const playAudio = () => {
                triggerHaptic();
                if (synth.paused) { synth.resume(); setIsPlaying(true); return; }
                synth.cancel(); 
                const textToRead = selectedChapter ? selectedChapter[language] : "";
                if(!textToRead) return;
                chunksRef.current = textToRead.split('\n').filter(t => t.trim().length > 0);
                chunkIndexRef.current = 0;
                setIsPlaying(true);
                speakNextChunk();
            };

            const pauseAudio = () => { triggerHaptic(); synth.pause(); setIsPlaying(false); };
            const stopAudioCompletely = () => { triggerHaptic(); synth.cancel(); setIsPlaying(false); chunkIndexRef.current = 0; };
            const togglePlaybackRate = () => {
                triggerHaptic();
                setPlaybackRate(r => r === 1 ? 1.5 : (r === 1.5 ? 2 : 1));
                if(synth.speaking && isPlaying) { stopAudioCompletely(); setTimeout(() => playAudio(), 100); } 
            };

            // --- YEPYENİ "PİLL" (HAP) TASARIMLI SEÇİM MENÜSÜ ---
            useEffect(() => {
                const handleSelectionEnd = () => {
                    if(noteModalOpen) return;
                    setTimeout(() => {
                        const selection = window.getSelection();
                        if (selection && selection.toString().trim().length > 0) {
                            const range = selection.getRangeAt(0);
                            const rect = range.getBoundingClientRect();
                            if (rect.width > 0 && rect.top > 0) {
                                let topPos = rect.top - 60; // Tek satıra indiği için daha yakın
                                let isBelow = false;
                                if (rect.top < 100) { topPos = rect.bottom + 15; isBelow = true; }
                                
                                // Ekrana sığdırma (Edge Clamping)
                                let leftPos = rect.left + (rect.width / 2);
                                const popupWidth = 320; // Tahmini yeni genişlik
                                const screenWidth = window.innerWidth;
                                if (leftPos - popupWidth / 2 < 10) leftPos = popupWidth / 2 + 10;
                                if (leftPos + popupWidth / 2 > screenWidth - 10) leftPos = screenWidth - popupWidth / 2 - 10;

                                setPopup({ text: selection.toString().trim(), top: Math.max(10, topPos), left: leftPos, state: 'menu', isBelow: isBelow });
                            }
                        } else { setPopup(null); }
                    }, 150);
                };
                document.addEventListener('mouseup', handleSelectionEnd);
                document.addEventListener('touchend', handleSelectionEnd);
                return () => {
                    document.removeEventListener('mouseup', handleSelectionEnd);
                    document.removeEventListener('touchend', handleSelectionEnd);
                };
            }, [popup, noteModalOpen]);

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(null), 3500); }

            const handleBookClick = (bookKey, chapterId = null) => {
                triggerHaptic();

                if (!bookData || !bookData.chapters || bookData.chapters.length === 0) {
                    showToast(t.bookNotReady);
                    return;
                }
                
                const chapter = chapterId ? bookData.chapters.find(c => c.id === chapterId) : bookData.chapters[0];
                setSelectedBookKey(bookKey);
                setSelectedChapter(chapter || bookData.chapters[0]);
                setActiveScreen('reading');
                setIsMegaMenuOpen(false);
                setIsFihristOpen(false);
                setIsNotesDrawerOpen(false);
                setScrollProgress(0);
                setIsAutoScrolling(false);
            };

            const handleChapterSelect = (chapter) => {
                triggerHaptic();
                if (animationsEnabled && chapter.id !== selectedChapter?.id) {
                    setIsTransitioning(true);
                    setTimeout(() => {
                        setSelectedChapter(chapter);
                        readingContainerRef.current?.scrollTo({ top: 0 });
                        setTimeout(() => setIsTransitioning(false), 50);
                    }, 300);
                } else {
                    setSelectedChapter(chapter);
                    readingContainerRef.current?.scrollTo({ top: 0, behavior: 'smooth' });
                }
                setIsFihristOpen(false);
                setIsAutoScrolling(false);
            }

            const goHome = () => {
                triggerHaptic();
                setActiveScreen('home');
                setPopup(null);
                setActiveCard(null);
                stopAudioCompletely();
                setIsMegaMenuOpen(false);
                setIsFihristOpen(false);
                setIsNotesDrawerOpen(false);
                setIsFocusMode(false);
                setTimeout(() => { setSelectedBookKey(null); setSelectedChapter(null); setScrollProgress(0); setIsAutoScrolling(false); }, 400);
            };

            const handleSiyerAssistant = (e) => {
                if(e) { e.preventDefault(); e.stopPropagation(); }
                triggerHaptic();
                const selectionNormalized = normalizeText(popup.text);
                setPopup(prev => ({ ...prev, state: 'assistant_loading' }));
                
                setTimeout(() => {
                    let foundMatch = null;
                    for (const [key, response] of Object.entries(ASSISTANT_DB)) {
                        const keyNormalized = normalizeText(key);
                        if (selectionNormalized.includes(keyNormalized) || keyNormalized.includes(selectionNormalized)) {
                            foundMatch = response;
                            break;
                        }
                    }
                    if (!foundMatch) foundMatch = "Kardeşlerim, bu satırlarda Asr-ı Saadet'in o sarsılmaz imanı ve teslimiyeti var. Seçtiğiniz bu kavram üzerine tefekkür etmek, nebevi çizgide bir şuur inşası için muazzam bir adımdır.";
                    setPopup(prev => ({ ...prev, state: 'assistant_result', assistantText: foundMatch }));
                }, 800);
            };

            const handleHighlight = (e, colorCode) => {
                if(e) { e.preventDefault(); e.stopPropagation(); }
                triggerHaptic();
                if(popup && popup.text) {
                    const textToSave = popup.text;
                    setUserHighlights(prev => {
                        const filtered = prev.filter(h => h.text !== textToSave);
                        return [...filtered, { text: textToSave, color: colorCode }];
                    });
                    showToast(t.highlight + " 🖍️");
                    setPopup(null);
                    window.getSelection().removeAllRanges();
                }
            };
            
            const removeHighlight = (textToRemove) => {
                triggerHaptic();
                setUserHighlights(prev => prev.filter(h => h.text !== textToRemove));
                showToast("Vurgu kaldırıldı 🧽");
            };

            const copyToClipboard = (e, text) => {
                if(e) { e.preventDefault(); e.stopPropagation(); }
                triggerHaptic();
                navigator.clipboard.writeText(text).then(() => {
                    showToast("Panoya kopyalandı 📋");
                    setPopup(null);
                    window.getSelection().removeAllRanges();
                }).catch(() => {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); showToast("Kopyalandı 📋"); } 
                    catch (err) { showToast("Kopyalama başarısız ❌"); }
                    document.body.removeChild(textArea);
                    setPopup(null);
                    window.getSelection().removeAllRanges();
                });
            };

            const openNoteModal = (e) => {
                if(e) { e.preventDefault(); e.stopPropagation(); }
                triggerHaptic();
                setNoteTargetText(popup.text);
                setNoteText(t.takeNoteHint);
                setEditingNoteId(null);
                setActiveNoteColor('default');
                setNoteModalOpen(true);
                setPopup(null);
            };

            const editNote = (note) => {
                triggerHaptic();
                setNoteTargetText(note.quote);
                setNoteText(note.text);
                setEditingNoteId(note.id);
                setActiveNoteColor(note.color || 'default'); 
                setNoteModalOpen(true);
                setIsNotesDrawerOpen(false);
            };

            const saveNote = () => {
                triggerHaptic();
                if (editingNoteId) {
                    setSavedNotes(prev => prev.map(n => n.id === editingNoteId ? { ...n, text: noteText, color: activeNoteColor } : n));
                    showToast(t.save + " 📝 (Güncellendi)");
                } else {
                    const newNote = {
                        id: Date.now(), quote: noteTargetText, text: noteText, color: activeNoteColor,
                        book: activeBook?.title || "Kitap", chapter: selectedChapter?.title || "Bölüm",
                        date: new Date().toLocaleDateString('tr-TR')
                    };
                    setSavedNotes(prev => [newNote, ...prev]);
                    showToast(t.save + " 📝");
                }
                setNoteModalOpen(false);
                setEditingNoteId(null);
                window.getSelection().removeAllRanges();
            };

            const deleteNote = (id) => {
                triggerHaptic();
                setSavedNotes(prev => prev.filter(n => n.id !== id));
                showToast("Not silindi 🗑️");
            };

            // Dinamik Çeviri Altyapısı ("1. Bölüm" -> "Chapter 1")
            const getTranslatedChapterTitle = (ch) => {
                if (!ch) return "";
                const originalTitle = ch.titleKey ? t[ch.titleKey] : ch.title; 
                if (!originalTitle) return "";
                
                const match = originalTitle.match(/^(\d+)\.\s*Bölüm:\s*(.*)$/i);
                if (match && language !== 'tr') {
                    const num = match[1];
                    const rest = match[2];
                    return `${t.chapterPrefix} ${num}: ${rest}`;
                }
                return originalTitle;
            };

            const renderTextWithHighlights = (text, currentLang) => {
                if (!text) return null;
                const pClass = currentLang === 'arp' ? "text-arabic" : "";
                
                const keywords = Object.keys(ENCYCLOPEDIA);
                const highlightTexts = userHighlights.map(h => h.text);
                
                if ((keywords.length === 0 && highlightTexts.length === 0) || currentLang !== 'tr') {
                    return text.split('\n\n').map((p, i) => <p key={i} className={pClass}>{p}</p>);
                }
                
                const userHighlightRegexes = userHighlights.map(h => ({
                    regexStr: `(${escapeRegExp(h.text)})`,
                    color: h.color,
                    rawText: h.text
                }));
                
                const encRegexes = keywords.map(k => ({
                    regexStr: `(${createFuzzyRegexStr(k)})`,
                    keyword: k
                }));
                
                const allRegexObjs = [
                    ...userHighlightRegexes.map(r => ({ ...r, type: 'user', length: r.rawText.length })),
                    ...encRegexes.map(r => ({ ...r, type: 'enc', length: r.keyword.length }))
                ].sort((a, b) => b.length - a.length);

                if(allRegexObjs.length === 0) return text.split('\n\n').map((p, i) => <p key={i} className={pClass}>{p}</p>);

                const combinedRegexStr = allRegexObjs.map(r => r.regexStr).join('|');
                const regex = new RegExp(combinedRegexStr, 'gi');
                
                return text.split('\n\n').map((paragraph, pIndex) => {
                    const parts = paragraph.split(regex).filter(p => p !== undefined); 
                    
                    return (
                        <p key={pIndex} className={pClass}>
                            {parts.map((part, i) => {
                                if (!part) return null;
                                
                                const normPart = normalizeText(part);
                                
                                const userHighlight = userHighlights.find(h => h.text.toLowerCase() === part.toLowerCase());
                                if (userHighlight) {
                                    let colorClass = 'bg-accentYellow/20 text-accentYellow border-accentYellow/50'; 
                                    if (userHighlight.color === 'green') colorClass = 'bg-accentGreen/20 text-accentGreen border-accentGreen/50';
                                    if (userHighlight.color === 'red') colorClass = 'bg-accentRed/20 text-accentRed border-accentRed/50';
                                    
                                    return <span key={i} onClick={() => removeHighlight(userHighlight.text)} className={`${colorClass} font-bold border-b-2 px-1 rounded-sm transition-colors theme-transition cursor-pointer`} title="Vurguyu kaldırmak için tıklayın">{part}</span>;
                                }

                                const encKeyword = keywords.find(k => normalizeText(k) === normPart);
                                if (encKeyword) {
                                    return <span key={i} onClick={() => {triggerHaptic(); setActiveCard({ title: part, desc: ENCYCLOPEDIA[encKeyword] })}} className="text-[#D4AF37] font-bold border-b border-[#D4AF37]/50 cursor-pointer transition-colors duration-300 hover:bg-[#D4AF37]/10 px-1 rounded-sm">{part}</span>;
                                }
                                
                                return part;
                            })}
                        </p>
                    );
                });
            };

            const activeBook = selectedBookKey ? (KULLIYAT_VERISI[selectedBookKey] || FALLBACK_BOOKS[selectedBookKey]) : null;
            const content = selectedChapter ? selectedChapter[language] : '';
            
            const readingTime = useMemo(() => {
                if (!content) return 0;
                return Math.max(1, Math.ceil(content.split(/\s+/).length / 200));
            }, [content]);

            // Bölümler Arası Geçiş (Next/Prev)
            const chapterIndex = useMemo(() => {
                if (!activeBook || !selectedChapter) return -1;
                return activeBook.chapters.findIndex(c => c.id === selectedChapter.id);
            }, [activeBook, selectedChapter]);

            const prevChapter = chapterIndex > 0 ? activeBook?.chapters[chapterIndex - 1] : null;
            const nextChapter = chapterIndex !== -1 && chapterIndex < (activeBook?.chapters.length || 0) - 1 ? activeBook?.chapters[chapterIndex + 1] : null;

            const renderAccordionContent = (tabId) => {
                switch(tabId) {
                    case 'search':
                        return (
                            <div className="flex flex-col space-y-3">
                                <input type="text" placeholder={t.searchPlaceholder} className="w-full bg-themeBg/50 border border-themeBorder rounded-lg p-3 text-sm text-themeText focus:border-gold outline-none" />
                                <span className="text-xs text-themeMuted italic">Arama sistemi çok yakında eklenecek...</span>
                            </div>
                        );
                    case 'dictionary':
                        return (
                            <div className="flex flex-col space-y-2 max-h-64 overflow-y-auto custom-scrollbar pr-2">
                                {Object.entries(ENCYCLOPEDIA).map(([word, desc]) => (
                                    <div key={word} onClick={() => { setIsMegaMenuOpen(false); setActiveCard({title: word, desc}); triggerHaptic(); }} className="p-3 border-b border-themeBorder/50 last:border-0 hover:bg-themeBg/50 transition-colors rounded-lg cursor-pointer group">
                                        <div className="text-gold font-bold text-sm mb-1 group-hover:scale-105 transition-transform origin-left">{word}</div>
                                        <div className="text-xs text-themeText/80 leading-relaxed line-clamp-2">{desc}</div>
                                    </div>
                                ))}
                            </div>
                        );
                    case 'author':
                        return (
                            <div className="flex flex-col items-center text-center space-y-4">
                                <img src="m.e.yıldırım.jpg" alt="M. Emin Yıldırım" onError={(e) => { e.target.onerror = null; e.target.src = 'https://ui-avatars.com/api/?name=M+Emin+Yıldırım&background=D4AF37&color=fff&size=200'; }} className="w-24 h-24 rounded-full mx-auto border-2 border-gold shadow-lg object-cover" />
                                <h3 className="text-xl font-serif text-themeText">Muhammed Emin Yıldırım</h3>
                                <p className="text-sm text-themeMuted leading-relaxed">
                                    {t.authorBio}
                                </p>
                            </div>
                        );
                    case 'settings':
                        return (
                            <div className="space-y-6">
                                <div>
                                    <label className="text-xs font-semibold text-themeMuted uppercase tracking-wider mb-3 block">{t.langSelect}</label>
                                    <div className="flex space-x-2">
                                        {[ {code: 'tr', label: 'TR'}, {code: 'ing', label: 'EN'}, {code: 'alm', label: 'DE'}, {code: 'arp', label: 'AR'} ].map(lang => (
                                            <button key={lang.code} onClick={() => {setLanguage(lang.code); triggerHaptic();}} className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-colors border ${language === lang.code ? 'border-gold text-themeBg bg-gold shadow-md' : 'border-themeBorder text-themeMuted hover:border-themeText hover:bg-themeBorder/30'}`}>{lang.label}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="w-full h-px bg-themeBorder/50"></div>
                                
                                <div>
                                    <label className="text-xs font-semibold text-themeMuted uppercase tracking-wider mb-3 block">{t.fontFamily}</label>
                                    <div className="flex space-x-2">
                                        <button onClick={() => {setFontFamily('serif'); triggerHaptic();}} className={`flex-1 py-2 rounded-lg text-sm border font-serif ${fontFamily === 'serif' ? 'border-gold text-gold bg-gold/10' : 'border-themeBorder text-themeMuted hover:border-themeText'}`}>Klasik (Serif)</button>
                                        <button onClick={() => {setFontFamily('sans'); triggerHaptic();}} className={`flex-1 py-2 rounded-lg text-sm border font-sans ${fontFamily === 'sans' ? 'border-gold text-gold bg-gold/10' : 'border-themeBorder text-themeMuted hover:border-themeText'}`}>Modern (Sans)</button>
                                    </div>
                                </div>

                                <div className="w-full h-px bg-themeBorder/50"></div>

                                <div>
                                    <label className="text-xs font-semibold text-themeMuted uppercase tracking-wider mb-3 block">{t.theme}</label>
                                    <div className="flex space-x-2">
                                        {['oled', 'sepia', 'light'].map(thm => (
                                            <button key={thm} onClick={() => {setTheme(thm); triggerHaptic();}} className={`flex-1 py-2 rounded-lg text-sm capitalize border ${theme === thm ? 'border-gold text-gold bg-gold/10' : 'border-themeBorder text-themeMuted hover:border-themeText'}`}>{thm}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <label className="text-xs font-semibold text-themeMuted uppercase tracking-wider mb-3 block flex items-center justify-between">
                                        <span>{t.anim}</span>
                                        <button onClick={() => {setAnimationsEnabled(!animationsEnabled); triggerHaptic();}} className={`w-10 h-5 rounded-full relative transition-colors ${animationsEnabled ? 'bg-gold' : 'bg-themeBorder'}`}>
                                            <div className={`w-3 h-3 bg-white rounded-full absolute top-1 transition-transform ${animationsEnabled ? 'left-6' : 'left-1'}`}></div>
                                        </button>
                                    </label>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            // DİNAMİK KİTAP SİSTEMİ (Kaç kitap varsa çeker)
            const availableKeys = (window.KULLIYAT_VERISI && Object.keys(window.KULLIYAT_VERISI).length > 0)
                ? Object.keys(window.KULLIYAT_VERISI)
                : Object.keys(FALLBACK_BOOKS);
            
            const orderedBooks = availableKeys.map(key => {
                const bookData = KULLIYAT_VERISI[key] || FALLBACK_BOOKS[key];
                if (!bookData) return null;
                return { key, book: bookData };
            }).filter(Boolean);

            return (
                <div className={`min-h-screen relative overflow-hidden font-sans theme-transition flex flex-col ${isFocusMode ? 'focus-mode-active' : ''}`}>
                    <div className="bg-glow-effect fixed top-[-20%] left-[-10%] w-[50%] h-[50%] blur-[120px] rounded-full pointer-events-none z-0 theme-transition transition-opacity duration-1000 animate-pulse-slow" style={{ backgroundColor: 'var(--primary-glow)' }}></div>
                    <div className="bg-glow-effect fixed bottom-[-20%] right-[-10%] w-[40%] h-[40%] blur-[100px] rounded-full pointer-events-none z-0 theme-transition transition-opacity duration-1000 animate-pulse-slow" style={{ backgroundColor: 'var(--primary-glow)' }}></div>

                    {toastMsg && (
                        <div className="fixed bottom-28 sm:bottom-8 left-1/2 transform -translate-x-1/2 z-[100] glass-panel px-6 py-3 rounded-full shadow-2xl border border-gold/50 text-gold font-medium animate-slide-up whitespace-nowrap">
                            {toastMsg}
                        </div>
                    )}

                    {/* --- ZAMAN TÜNELİ MODAL --- */}
                    <div className={`fixed inset-0 z-[80] transition-all duration-500 ${isTimelineOpen ? 'opacity-100 visible' : 'opacity-0 invisible pointer-events-none'}`}>
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setIsTimelineOpen(false)}></div>
                        <div className={`absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-11/12 max-w-md glass-panel border border-themeBorder shadow-2xl rounded-2xl p-6 transition-transform duration-500 ${isTimelineOpen ? 'scale-100' : 'scale-95'}`}>
                            <div className="flex justify-between items-center mb-6 pb-3 border-b border-themeBorder">
                                <h3 className="font-serif text-lg text-gold flex items-center gap-2"><IconHourglass /> {t.timeline}</h3>
                                <button onClick={() => setIsTimelineOpen(false)} className="text-themeMuted hover:text-red-400 transition-colors"><IconClose /></button>
                            </div>
                            <div className="space-y-6 px-2">
                                <div className="relative pl-6 border-l-2 border-gold/40">
                                    <div className="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-themeBg border-2 border-gold shadow-[0_0_10px_rgba(212,175,55,0.5)]"></div>
                                    <h4 className="font-bold text-themeText text-lg">{t.timelineMekke}</h4>
                                    <p className="text-sm text-themeMuted mt-1 leading-relaxed">{t.timelineMekkeDesc}</p>
                                </div>
                                <div className="relative pl-6 border-l-2 border-gold/40">
                                    <div className="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-themeBg border-2 border-gold shadow-[0_0_10px_rgba(212,175,55,0.5)]"></div>
                                    <h4 className="font-bold text-themeText text-lg">{t.timelineHicret}</h4>
                                    <p className="text-sm text-themeMuted mt-1 leading-relaxed">{t.timelineHicretDesc}</p>
                                </div>
                                <div className="relative pl-6 border-l-2 border-transparent">
                                    <div className="absolute -left-[9px] top-1 w-4 h-4 rounded-full bg-themeBg border-2 border-gold shadow-[0_0_10px_rgba(212,175,55,0.5)]"></div>
                                    <h4 className="font-bold text-themeText text-lg">{t.timelineMedine}</h4>
                                    <p className="text-sm text-themeMuted mt-1 leading-relaxed">{t.timelineMedineDesc}</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* --- NOT ALMA VE DÜZENLEME MODAL --- */}
                    {noteModalOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center">
                            <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setNoteModalOpen(false)}></div>
                            <div className="relative w-11/12 max-w-lg glass-panel border border-themeBorder rounded-2xl shadow-2xl p-6 animate-slide-up">
                                <div className="flex justify-between items-center mb-4"><h3 className="font-serif text-lg text-themeText">{t.noteTitle} {editingNoteId && "(Düzenle)"}</h3><button onClick={() => setNoteModalOpen(false)} className="text-themeMuted hover:text-red-400"><IconClose /></button></div>
                                
                                <div className={`mb-4 p-3 rounded-lg border-l-[3px] text-sm italic text-themeMuted line-clamp-3 overflow-hidden bg-themeBorder/20
                                    ${activeNoteColor === 'yellow' ? 'border-accentYellow bg-accentYellow/10' : 
                                      activeNoteColor === 'green' ? 'border-accentGreen bg-accentGreen/10' : 
                                      activeNoteColor === 'red' ? 'border-accentRed bg-accentRed/10' : 'border-gold'}`}>
                                    "{noteTargetText}"
                                </div>
                                
                                <div className="mb-4 flex items-center justify-between bg-themeBg/30 p-2 rounded-lg border border-themeBorder/50">
                                    <span className="text-xs text-themeMuted ml-1 font-semibold">{t.noteColor}</span>
                                    <div className="flex space-x-2">
                                        <button onClick={() => {setActiveNoteColor('default'); triggerHaptic();}} className={`w-6 h-6 rounded-full border-2 transition-transform ${activeNoteColor === 'default' ? 'border-gold scale-110 shadow-[0_0_8px_rgba(212,175,55,0.6)]' : 'border-themeBorder hover:scale-105'} bg-themePanel`}></button>
                                        <button onClick={() => {setActiveNoteColor('yellow'); triggerHaptic();}} className={`w-6 h-6 rounded-full border-2 transition-transform ${activeNoteColor === 'yellow' ? 'border-accentYellow scale-110 shadow-[0_0_8px_rgba(250,204,21,0.6)]' : 'border-transparent hover:scale-105'} bg-accentYellow`}></button>
                                        <button onClick={() => {setActiveNoteColor('green'); triggerHaptic();}} className={`w-6 h-6 rounded-full border-2 transition-transform ${activeNoteColor === 'green' ? 'border-accentGreen scale-110 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'border-transparent hover:scale-105'} bg-accentGreen`}></button>
                                        <button onClick={() => {setActiveNoteColor('red'); triggerHaptic();}} className={`w-6 h-6 rounded-full border-2 transition-transform ${activeNoteColor === 'red' ? 'border-accentRed scale-110 shadow-[0_0_8px_rgba(239,68,68,0.6)]' : 'border-transparent hover:scale-105'} bg-accentRed`}></button>
                                    </div>
                                </div>

                                <textarea autoFocus value={noteText} onChange={(e) => setNoteText(e.target.value)} onFocus={(e) => {if(e.target.value===t.takeNoteHint) setNoteText('')}} className="w-full h-32 bg-themeBg/50 border border-themeBorder rounded-xl p-3 text-themeText focus:outline-none focus:border-gold/50 resize-none"></textarea>
                                
                                <div className="flex justify-end space-x-3 mt-4">
                                    <button onClick={() => setNoteModalOpen(false)} className="px-4 py-2 text-sm text-themeMuted hover:text-themeText">{t.cancel}</button>
                                    <button onClick={saveNote} className="px-5 py-2 bg-gold/20 text-gold border border-gold/30 rounded-lg text-sm font-semibold hover:bg-gold/30 transition-colors">{t.save}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- DEFTERİM / NOTLAR DRAWER --- */}
                    <div className={`fixed inset-0 z-[60] transition-all duration-500 ${isNotesDrawerOpen ? 'opacity-100 visible' : 'opacity-0 invisible pointer-events-none'}`}>
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsNotesDrawerOpen(false)}></div>
                        <div className={`absolute top-0 right-0 bottom-0 w-full sm:w-96 glass-panel border-l border-themeBorder shadow-2xl p-6 transition-transform duration-500 flex flex-col ${isNotesDrawerOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="flex justify-between items-center mb-6 pb-4 border-b border-themeBorder"><h3 className="font-serif text-lg text-gold flex items-center gap-2"><IconNotebook /> {t.myNotes}</h3><button onClick={() => setIsNotesDrawerOpen(false)} className="text-themeMuted hover:text-red-400"><IconClose /></button></div>
                            <div className="flex-1 overflow-y-auto pr-2 space-y-4 custom-scrollbar">
                                {savedNotes.length === 0 ? <div className="text-center text-themeMuted text-sm mt-10 italic">{t.emptyNotes}</div> : savedNotes.map(note => (
                                    <div key={note.id} className={`bg-themeBorder/30 rounded-xl p-4 border shadow-sm relative group transition-colors 
                                        ${note.color === 'yellow' ? 'border-l-4 border-l-accentYellow border-y-themeBorder border-r-themeBorder bg-accentYellow/5' : 
                                          note.color === 'green' ? 'border-l-4 border-l-accentGreen border-y-themeBorder border-r-themeBorder bg-accentGreen/5' : 
                                          note.color === 'red' ? 'border-l-4 border-l-accentRed border-y-themeBorder border-r-themeBorder bg-accentRed/5' : 
                                          'border-themeBorder'}`}>
                                        <div className="text-[10px] uppercase text-themeMuted mb-2 flex justify-between items-center">
                                            <span className="truncate mr-2">{note.book} • {note.chapter} | {note.date}</span>
                                            <div className="flex space-x-1 shrink-0">
                                                <button onClick={() => editNote(note)} className="text-themeMuted hover:text-gold p-1.5 rounded-lg bg-themeBorder/50 hover:bg-themeBorder transition-colors" title="Notu Düzenle">
                                                    <IconEdit size={14}/>
                                                </button>
                                                <button onClick={() => deleteNote(note.id)} className="text-themeMuted hover:text-red-400 p-1.5 rounded-lg bg-themeBorder/50 hover:bg-red-500/20 transition-colors" title="Notu Sil">
                                                    <IconTrash size={14}/>
                                                </button>

                            <div className="fixed bottom-0 left-0 w-full glass-panel border-t border-themeBorder shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-[85] animate-slide-up pb-safe" onClick={(e) => e.stopPropagation()}>
                                <div className="max-w-5xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between gap-3">
                                    <div className="flex items-center space-x-3 sm:space-x-5 flex-1 min-w-0">
                                        <button onClick={() => isPlaying ? pauseAudio() : playAudio()} className="shrink-0 w-12 h-12 sm:w-14 sm:h-14 rounded-full bg-gradient-to-br from-gold to-[#B8942E] text-themeBg flex items-center justify-center hover:scale-105 transition-transform shadow-[0_0_20px_rgba(212,175,55,0.5)]">
                                            {isPlaying ? <IconPause /> : <IconPlay />}
                                        </button>
                                        <div className="flex flex-col min-w-0 flex-1">
                                            <div className="text-sm sm:text-base font-serif font-bold text-themeText truncate">{getTranslatedChapterTitle(selectedChapter) || "Sesli Dinle"}</div>
                                            <div className="text-[10px] sm:text-xs text-themeMuted tracking-wider uppercase">{isPlaying ? "Oynatılıyor..." : "Duraklatıldı"}</div>
                                        </div>
                                    </div>
                                    <div className="flex items-center space-x-2 sm:space-x-4 shrink-0">
                                        <button onClick={togglePlaybackRate} className="px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl border border-themeBorder text-themeMuted hover:text-gold hover:border-gold/50 transition-colors text-xs sm:text-sm font-bold shadow-sm bg-themeBg/50">
                                            {playbackRate}x
                                        </button>
                                        <button onClick={() => {showToast("İndirme modülü hazırlanıyor... 📥"); triggerHaptic();}} className="p-2 sm:p-2.5 text-themeMuted hover:text-gold transition-colors bg-themeBg/50 rounded-xl border border-transparent hover:border-gold/30" title="Bölümü İndir">
                                            <IconCloudDownload />
                                        </button>
                                        <div className="w-px h-6 sm:h-8 bg-themeBorder mx-1 sm:mx-2"></div>
                                        <button onClick={() => { stopAudioCompletely(); setShowAudioPlayer(false); triggerHaptic();}} className="p-2 sm:p-2.5 text-themeMuted hover:text-red-400 transition-colors bg-themeBg/50 rounded-xl border border-transparent hover:border-red-400/30" title="Kapat">
                                            <IconClose />
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
